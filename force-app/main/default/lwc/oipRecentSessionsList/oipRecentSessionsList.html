<template>
    <template if:true={sessions}>
        <template for:each={sessions} for:item="session">
            <div key={session.id} class="slds-border_bottom slds-p-vertical_small">
                <div class="slds-grid slds-grid_vertical-align-center">
                    <div class="slds-col slds-size_2-of-3">
                        <p class="slds-text-body_regular slds-truncate">{session.queryText}</p>
                        <p class="slds-text-body_small slds-text-color_weak">
                            {session.sessionType} &bull; {session.status} &bull; {session.startTime}
                        </p>
                    </div>
                    <div class="slds-col slds-size_1-of-3 slds-text-align_right">
                        <template if:true={session.confidenceScore}>
                            <span class={session.confidenceClass}>{session.confidenceScore}%</span>
                        </template>
                    </div>
                </div>
            </div>
        </template>
    </template>
    <template if:false={sessions}>
        <p class="slds-text-body_regular slds-text-color_weak">No recent sessions found.</p>
    </template>
</template>

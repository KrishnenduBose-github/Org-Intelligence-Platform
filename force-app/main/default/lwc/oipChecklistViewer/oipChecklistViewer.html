<template>
    <div class="slds-m-top_medium">
        <lightning-card title="Verification Checklist">
            <div class="slds-p-around_small">
                <template for:each={items} for:item="item" for:index="idx">
                    <div key={item} class="slds-checkbox_button slds-m-bottom_x-small" style="display: block; text-align: left;">
                        <div style="display: inline-flex; align-items: flex-start; gap: 0.5rem;">
                            <lightning-icon icon-name="utility:check" size="x-small"></lightning-icon>
                            <span class="slds-text-body_regular">{item}</span>
                        </div>
                    </div>
                </template>
                <template if:false={items.length}>
                    <p class="slds-text-color_weak">No checklist items available.</p>
                </template>
            </div>
        </lightning-card>
    </div>
</template>
